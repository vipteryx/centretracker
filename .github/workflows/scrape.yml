name: Scrape Renfrew Pool Hours

on:
  schedule:
    # Run every 6 hours: midnight, 6 AM, noon, 6 PM UTC
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run scraper
        id: scrape
        run: node scrape-britannia-playwright.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add britannia-hours.json package-lock.json

          # Build an informative commit message from the diff
          if git diff --cached --quiet; then
            echo "No changes – skipping commit."
          else
            # Extract key fields from the freshly-written JSON
            HEADING=$(node -e "const d=require('./britannia-hours.json'); console.log(d.primaryHeading || '(none)')")
            ITEMS=$(node -e "const d=require('./britannia-hours.json'); console.log((d.scheduleItems||[]).length)")
            DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

            git commit -m "Scrape ${DATE}: \"${HEADING}\" — ${ITEMS} schedule item(s)"
            git push origin HEAD
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Scraper failed – ${new Date().toISOString().slice(0,10)}`;
            const body = [
              "The scheduled scrape job failed.",
              "",
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "The site may be behind Cloudflare or the page structure may have changed.",
            ].join("\n");

            // Avoid duplicate open issues for the same day
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "scrape-failure",
            });

            const alreadyOpen = existing.data.some((i) => i.title === title);
            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["scrape-failure"],
              });
            }
