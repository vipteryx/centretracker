name: Scrape Pool Schedule

on:
  schedule:
    - cron: "0 2,14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install scraper dependency
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run scraper
        run: node scraper.js

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add page-summary.json pool-times.json pool-times-debug-api.json pool-times-debug.html britannia-page-summary.json britannia-pool-times.json britannia-pool-times-debug-api.json britannia-pool-times-debug.html aquatic-page-summary.json aquatic-pool-times.json aquatic-pool-times-debug-api.json aquatic-pool-times-debug.html templeton-page-summary.json templeton-pool-times.json templeton-pool-times-debug-api.json templeton-pool-times-debug.html renfrew-page-summary.json renfrew-pool-times.json renfrew-pool-times-debug-api.json renfrew-pool-times-debug.html kensington-page-summary.json kensington-pool-times.json kensington-pool-times-debug-api.json kensington-pool-times-debug.html killarney-page-summary.json killarney-pool-times.json killarney-pool-times-debug-api.json killarney-pool-times-debug.html lord-byng-page-summary.json lord-byng-pool-times.json lord-byng-pool-times-debug-api.json lord-byng-pool-times-debug.html || true
          git commit -m "Update scraped pool data" || echo "No changes"
          git push origin HEAD
