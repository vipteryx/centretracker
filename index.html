<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hillcrest Pool Status</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 1rem;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .open { color: green; }
    .closed { color: red; }
    #next {
      font-size: 0.85em;
      color: #555;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="row">
    <span>Hillcrest Pool</span>
    <span id="status">…</span>
  </div>
  <div id="next"></div>
  <script>
    function parseTime(str) {
      const m = str.trim().match(/(\d+):(\d+)\s*(AM|PM)/i);
      if (!m) return null;
      let h = parseInt(m[1], 10);
      const min = parseInt(m[2], 10);
      const ampm = m[3].toUpperCase();
      if (ampm === "PM" && h !== 12) h += 12;
      if (ampm === "AM" && h === 12) h = 0;
      return h * 60 + min;
    }

    function isPublic(session) {
      return session.time && !/bulkhead/i.test(session.name);
    }

    function nextSession(days, today, nowMin) {
      // Check remaining sessions today, then future days
      const todayIndex = days.findIndex(d => d.date === today);
      const searchDays = todayIndex === -1 ? days : days.slice(todayIndex);
      for (const day of searchDays) {
        const isToday = day.date === today;
        for (const s of day.sessions) {
          if (!isPublic(s)) continue;
          const start = parseTime(s.time.split(" - ")[0]);
          if (start === null) continue;
          if (isToday && start <= nowMin) continue; // already started or passed
          return { session: s, day };
        }
      }
      return null;
    }

    async function updateStatus() {
      const statusEl = document.getElementById("status");
      const nextEl = document.getElementById("next");
      try {
        const data = await fetch("pool-times.json").then(r => r.json());
        const now = new Date();
        const today = [
          now.getFullYear(),
          String(now.getMonth() + 1).padStart(2, "0"),
          String(now.getDate()).padStart(2, "0"),
        ].join("-");
        const nowMin = now.getHours() * 60 + now.getMinutes();
        const todayData = data.days.find(d => d.date === today);

        const open = todayData && todayData.sessions.some(s => {
          if (!isPublic(s)) return false;
          const [start, end] = s.time.split(" - ").map(parseTime);
          return start !== null && end !== null && nowMin >= start && nowMin <= end;
        });

        statusEl.textContent = open ? "Open" : "Closed";
        statusEl.className = open ? "open" : "closed";

        if (!open) {
          const next = nextSession(data.days, today, nowMin);
          if (next) {
            const startTime = next.session.time.split(" - ")[0].trim();
            const isToday = next.day.date === today;
            const when = isToday ? startTime : `${next.day.dayOfWeek} ${startTime}`;
            nextEl.textContent = `Opens ${when} · ${next.session.name}`;
          }
        }
      } catch {
        statusEl.textContent = "Unknown";
      }
    }

    updateStatus();
  </script>
</body>
</html>
