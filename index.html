<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vancouver Pool Status</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --border: #e0e0e5;
      --text-primary: #1a1a2e;
      --text-secondary: #6b6b80;
      --open-bg: #e8f5e9;
      --open-text: #2e7d32;
      --closed-bg: #fce4ec;
      --closed-text: #c62828;
      --unknown-bg: #f3f3f3;
      --unknown-text: #666;
      --accent: #1565c0;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    header p {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .venue-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .badge {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge.open    { background: var(--open-bg);    color: var(--open-text); }
    .badge.closed  { background: var(--closed-bg);  color: var(--closed-text); }
    .badge.unknown { background: var(--unknown-bg); color: var(--unknown-text); }

    .next {
      font-size: 0.8rem;
      color: var(--text-secondary);
      padding-left: 0.1rem;
      min-height: 1em;
    }

    footer {
      font-size: 0.72rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>Vancouver Pool Status</h1>
    <p id="updated"></p>
  </header>

  <div class="cards">
    <div class="card" id="card-hillcrest">
      <div class="card-top">
        <span class="venue-name">Hillcrest Pool</span>
        <span class="badge unknown" id="status-hillcrest">…</span>
      </div>
      <div class="next" id="next-hillcrest"></div>
    </div>

    <div class="card" id="card-britannia">
      <div class="card-top">
        <span class="venue-name">Britannia Pool</span>
        <span class="badge unknown" id="status-britannia">…</span>
      </div>
      <div class="next" id="next-britannia"></div>
    </div>
  </div>

  <footer>Updated twice daily · <span id="now"></span></footer>

  <script>
    function parseTime(str) {
      const m = str.trim().match(/(\d+):(\d+)\s*(AM|PM)/i);
      if (!m) return null;
      let h = parseInt(m[1], 10);
      const min = parseInt(m[2], 10);
      const ampm = m[3].toUpperCase();
      if (ampm === "PM" && h !== 12) h += 12;
      if (ampm === "AM" && h === 12) h = 0;
      return h * 60 + min;
    }

    function isPublic(session) {
      return session.time && !/bulkhead/i.test(session.name);
    }

    function nextSession(days, today, nowMin) {
      const todayIndex = days.findIndex(d => d.date === today);
      const searchDays = todayIndex === -1 ? days : days.slice(todayIndex);
      for (const day of searchDays) {
        const isToday = day.date === today;
        for (const s of day.sessions) {
          if (!isPublic(s)) continue;
          const start = parseTime(s.time.split(" - ")[0]);
          if (start === null) continue;
          if (isToday && start <= nowMin) continue;
          return { session: s, day };
        }
      }
      return null;
    }

    function today() {
      const now = new Date();
      return [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2, "0"),
        String(now.getDate()).padStart(2, "0"),
      ].join("-");
    }

    async function loadVenue(dataUrl, statusId, nextId) {
      const statusEl = document.getElementById(statusId);
      const nextEl   = document.getElementById(nextId);
      try {
        const data = await fetch(dataUrl).then(r => r.json());
        const now = new Date();
        const todayStr = today();
        const nowMin = now.getHours() * 60 + now.getMinutes();
        const todayData = data.days.find(d => d.date === todayStr);

        const open = todayData && todayData.sessions.some(s => {
          if (!isPublic(s)) return false;
          const [start, end] = s.time.split(" - ").map(parseTime);
          return start !== null && end !== null && nowMin >= start && nowMin <= end;
        });

        statusEl.textContent = open ? "Open" : "Closed";
        statusEl.className   = "badge " + (open ? "open" : "closed");

        if (!open) {
          const next = nextSession(data.days, todayStr, nowMin);
          if (next) {
            const startTime = next.session.time.split(" - ")[0].trim();
            const isToday   = next.day.date === todayStr;
            const when      = isToday ? startTime : `${next.day.dayOfWeek} ${startTime}`;
            nextEl.textContent = `Opens ${when} · ${next.session.name}`;
          }
        }
      } catch {
        statusEl.textContent = "Unknown";
        statusEl.className   = "badge unknown";
      }
    }

    function renderClock() {
      const now = new Date();
      document.getElementById("now").textContent =
        now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    loadVenue("pool-times.json",          "status-hillcrest", "next-hillcrest");
    loadVenue("britannia-pool-times.json","status-britannia",  "next-britannia");
    renderClock();
    setInterval(renderClock, 30000);
  </script>
</body>
</html>
