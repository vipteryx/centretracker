<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vancouver Pool Status</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --border: #e0e0e5;
      --text-primary: #1a1a2e;
      --text-secondary: #6b6b80;
      --open-text: #2e7d32;
      --closed-text: #c62828;
      --unknown-text: #666;
      --accent: #1565c0;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    header p {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .venue-left {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .venue-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .venue-status {
      font-size: 0.8rem;
      font-weight: 700;
    }

    .venue-status.open    { color: var(--open-text); }
    .venue-status.closed  { color: var(--closed-text); }
    .venue-status.unknown { color: var(--unknown-text); }

    .venue-time {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
      text-align: right;
      white-space: nowrap;
      flex-shrink: 0;
      padding-top: 0.05rem;
    }

    .next {
      font-size: 0.8rem;
      color: var(--text-secondary);
      padding-left: 0.1rem;
      min-height: 1em;
    }

    footer {
      font-size: 0.72rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
      text-align: center;
    }

    .card { cursor: pointer; }

    .chevron {
      font-size: 1.1rem;
      color: var(--text-secondary);
      transition: transform 0.25s ease;
      flex-shrink: 0;
      margin-left: 0.25rem;
      line-height: 1;
      align-self: center;
    }
    .card.expanded .chevron { transform: rotate(90deg); }

    .schedule {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .card.expanded .schedule { max-height: 600px; }

    .schedule-inner {
      border-top: 1px solid var(--border);
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .schedule-row {
      display: flex;
      gap: 0.75rem;
      font-size: 0.78rem;
      line-height: 1.3;
    }
    .schedule-time {
      color: var(--text-secondary);
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 5rem;
    }
    .schedule-name { color: var(--text-primary); }

    .schedule-row.active .schedule-time,
    .schedule-row.active .schedule-name {
      color: var(--open-text);
      font-weight: 600;
    }

    .schedule-empty {
      font-size: 0.78rem;
      color: var(--text-secondary);
      padding: 0.25rem 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Vancouver Pool Status</h1>
    <p id="updated"></p>
  </header>

  <div class="cards">
    <div class="card" id="card-britannia">
      <div class="card-top">
        <div class="venue-left">
          <span class="venue-name">Britannia Pool</span>
          <span class="venue-status unknown" id="status-britannia">…</span>
        </div>
        <div class="venue-time" id="time-britannia"></div>
        <span class="chevron">›</span>
      </div>
      <div class="next" id="next-britannia"></div>
      <div class="schedule" id="schedule-britannia"></div>
    </div>

    <div class="card" id="card-hillcrest">
      <div class="card-top">
        <div class="venue-left">
          <span class="venue-name">Hillcrest Pool</span>
          <span class="venue-status unknown" id="status-hillcrest">…</span>
        </div>
        <div class="venue-time" id="time-hillcrest"></div>
        <span class="chevron">›</span>
      </div>
      <div class="next" id="next-hillcrest"></div>
      <div class="schedule" id="schedule-hillcrest"></div>
    </div>

    <div class="card" id="card-kensington">
      <div class="card-top">
        <div class="venue-left">
          <span class="venue-name">Kensington Pool</span>
          <span class="venue-status unknown" id="status-kensington">…</span>
        </div>
        <div class="venue-time" id="time-kensington"></div>
        <span class="chevron">›</span>
      </div>
      <div class="next" id="next-kensington"></div>
      <div class="schedule" id="schedule-kensington"></div>
    </div>

    <div class="card" id="card-killarney">
      <div class="card-top">
        <div class="venue-left">
          <span class="venue-name">Killarney Pool</span>
          <span class="venue-status unknown" id="status-killarney">…</span>
        </div>
        <div class="venue-time" id="time-killarney"></div>
        <span class="chevron">›</span>
      </div>
      <div class="next" id="next-killarney"></div>
      <div class="schedule" id="schedule-killarney"></div>
    </div>

    <div class="card" id="card-lord-byng">
      <div class="card-top">
        <div class="venue-left">
          <span class="venue-name">Lord Byng Pool</span>
          <span class="venue-status unknown" id="status-lord-byng">…</span>
        </div>
        <div class="venue-time" id="time-lord-byng"></div>
        <span class="chevron">›</span>
      </div>
      <div class="next" id="next-lord-byng"></div>
      <div class="schedule" id="schedule-lord-byng"></div>
    </div>

    <div class="card" id="card-renfrew">
      <div class="card-top">
        <div class="venue-left">
          <span class="venue-name">Renfrew Pool</span>
          <span class="venue-status unknown" id="status-renfrew">…</span>
        </div>
        <div class="venue-time" id="time-renfrew"></div>
        <span class="chevron">›</span>
      </div>
      <div class="next" id="next-renfrew"></div>
      <div class="schedule" id="schedule-renfrew"></div>
    </div>

    <div class="card" id="card-templeton">
      <div class="card-top">
        <div class="venue-left">
          <span class="venue-name">Templeton Pool</span>
          <span class="venue-status unknown" id="status-templeton">…</span>
        </div>
        <div class="venue-time" id="time-templeton"></div>
        <span class="chevron">›</span>
      </div>
      <div class="next" id="next-templeton"></div>
      <div class="schedule" id="schedule-templeton"></div>
    </div>

    <div class="card" id="card-aquatic">
      <div class="card-top">
        <div class="venue-left">
          <span class="venue-name">Vancouver Aquatic Centre</span>
          <span class="venue-status unknown" id="status-aquatic">…</span>
        </div>
        <div class="venue-time" id="time-aquatic"></div>
        <span class="chevron">›</span>
      </div>
      <div class="next" id="next-aquatic"></div>
      <div class="schedule" id="schedule-aquatic"></div>
    </div>
  </div>

  <footer>Updated twice daily · <span id="now"></span></footer>

  <script>
    function parseTime(str) {
      const m = str.trim().match(/(\d+):(\d+)\s*(AM|PM)/i);
      if (!m) return null;
      let h = parseInt(m[1], 10);
      const min = parseInt(m[2], 10);
      const ampm = m[3].toUpperCase();
      if (ampm === "PM" && h !== 12) h += 12;
      if (ampm === "AM" && h === 12) h = 0;
      return h * 60 + min;
    }

    function isPublic(session) {
      return session.time && !/bulkhead/i.test(session.name);
    }

    function nextSession(days, today, nowMin) {
      const todayIndex = days.findIndex(d => d.date === today);
      const searchDays = todayIndex === -1 ? days : days.slice(todayIndex);
      for (const day of searchDays) {
        const isToday = day.date === today;
        for (const s of day.sessions) {
          if (!isPublic(s)) continue;
          const start = parseTime(s.time.split(" - ")[0]);
          if (start === null) continue;
          if (isToday && start <= nowMin) continue;
          return { session: s, day };
        }
      }
      return null;
    }

    function today() {
      const now = new Date();
      return [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2, "0"),
        String(now.getDate()).padStart(2, "0"),
      ].join("-");
    }

    function renderSchedule(key, data, nowMin, todayStr) {
      const el = document.getElementById("schedule-" + key);
      const todayData = data.days.find(d => d.date === todayStr);
      const sessions = todayData ? todayData.sessions.filter(isPublic) : [];
      const inner = document.createElement("div");
      inner.className = "schedule-inner";
      if (sessions.length === 0) {
        const empty = document.createElement("div");
        empty.className = "schedule-empty";
        empty.textContent = "No sessions today";
        inner.appendChild(empty);
      } else {
        for (const s of sessions) {
          const parts = s.time.split(" - ");
          const startStr = parts[0].trim();
          const start = parseTime(startStr);
          const end = parts[1] ? parseTime(parts[1].trim()) : null;
          const row = document.createElement("div");
          row.className = "schedule-row";
          if (start !== null && end !== null && nowMin >= start && nowMin <= end) {
            row.classList.add("active");
          }
          const timeSpan = document.createElement("span");
          timeSpan.className = "schedule-time";
          timeSpan.textContent = startStr;
          const nameSpan = document.createElement("span");
          nameSpan.className = "schedule-name";
          nameSpan.textContent = s.name;
          row.appendChild(timeSpan);
          row.appendChild(nameSpan);
          inner.appendChild(row);
        }
      }
      el.appendChild(inner);
    }

    async function loadVenue(dataUrl, key) {
      const statusEl = document.getElementById("status-" + key);
      const timeEl   = document.getElementById("time-"   + key);
      const nextEl   = document.getElementById("next-"   + key);
      try {
        const data = await fetch(dataUrl).then(r => r.json());
        const now = new Date();
        const todayStr = today();
        const nowMin = now.getHours() * 60 + now.getMinutes();
        const todayData = data.days.find(d => d.date === todayStr);
        const todaySessions = todayData ? todayData.sessions.filter(isPublic) : [];

        const currentSession = todayData
          ? todayData.sessions.find(s => {
              if (!isPublic(s)) return false;
              const [start, end] = s.time.split(" - ").map(parseTime);
              return start !== null && end !== null && nowMin >= start && nowMin <= end;
            }) || null
          : null;

        const open = !!currentSession;

        statusEl.textContent = open ? "Open" : "Closed";
        statusEl.className   = "venue-status " + (open ? "open" : "closed");

        if (open) {
          // Show the pool's closing time: end of the last public session today
          const lastSession = todaySessions[todaySessions.length - 1];
          const closeTime = lastSession ? lastSession.time.split(" - ")[1]?.trim() : null;
          timeEl.textContent = closeTime || currentSession.time.split(" - ")[1].trim();
          nextEl.textContent = `${currentSession.name} · ${currentSession.time}`;
        } else {
          // Show the full pool hours (first session start – last session end)
          const next = nextSession(data.days, todayStr, nowMin);
          if (next) {
            const dayData = data.days.find(d => d.date === next.day.date);
            const daySessions = dayData ? dayData.sessions.filter(isPublic) : [];
            const firstStart = daySessions[0]?.time.split(" - ")[0]?.trim();
            const lastEnd = daySessions[daySessions.length - 1]?.time.split(" - ")[1]?.trim();
            const isToday = next.day.date === todayStr;
            if (firstStart && lastEnd) {
              const rangeText = `${firstStart} – ${lastEnd}`;
              timeEl.textContent = isToday ? rangeText : `${next.day.dayOfWeek} ${rangeText}`;
            } else {
              timeEl.textContent = isToday ? next.session.time : `${next.day.dayOfWeek} ${next.session.time}`;
            }
            nextEl.textContent = `${next.session.name} · ${next.session.time}`;
          } else {
            timeEl.textContent = "";
            nextEl.textContent = "No upcoming sessions";
          }
        }

        renderSchedule(key, data, nowMin, todayStr);
      } catch {
        statusEl.textContent = "Unknown";
        statusEl.className   = "venue-status unknown";
      }
    }

    function renderClock() {
      const now = new Date();
      document.getElementById("now").textContent =
        now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    const venueKeys = ["britannia", "hillcrest", "kensington", "killarney", "lord-byng", "renfrew", "templeton", "aquatic"];
    for (const key of venueKeys) {
      document.getElementById("card-" + key).addEventListener("click", () => {
        document.getElementById("card-" + key).classList.toggle("expanded");
      });
    }

    loadVenue("britannia-pool-times.json",  "britannia");
    loadVenue("pool-times.json",            "hillcrest");
    loadVenue("kensington-pool-times.json", "kensington");
    loadVenue("killarney-pool-times.json",  "killarney");
    loadVenue("lord-byng-pool-times.json",  "lord-byng");
    loadVenue("renfrew-pool-times.json",    "renfrew");
    loadVenue("templeton-pool-times.json",  "templeton");
    loadVenue("aquatic-pool-times.json",    "aquatic");
    renderClock();
    setInterval(renderClock, 30000);
  </script>
</body>
</html>
